<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documentary Ethics Compass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link id="skin-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <a class="skip-link" href="#content-root">Přeskočit na obsah</a>

  <header id="hero" class="hero" aria-labelledby="site-title">
    <h1 id="site-title"></h1>

    <nav class="language-switch" aria-label="Language switcher">
      <button type="button" class="lang-link is-active" data-lang="cs">CS</button>
      <span aria-hidden="true">|</span>
      <button type="button" class="lang-link" data-lang="en">EN</button>
      <span aria-hidden="true">|</span>
      <button type="button" class="lang-link" data-lang="ua">UA</button>
      <span aria-hidden="true">|</span>
      <button type="button" class="lang-link" data-lang="ar">AR</button>
    </nav>

    <p id="site-subtitle"></p>

    <div class="hero-compass-panel">
      <div class="wheel-wrap">
        <div class="compass-layout">
          <svg id="ethics-wheel" viewBox="0 0 520 520" role="img" aria-labelledby="wheel-title wheel-desc" tabindex="0">
            <title id="wheel-title">Interaktivní etický rozcestník</title>
            <desc id="wheel-desc">Čtyři etické sekce uspořádané kolem středu, aktivní část je zvýrazněna.</desc>

            <g id="wheel-connectors"></g>
            <g id="wheel-label-nodes"></g>

            <g id="wheel-disc">
              <g id="wheel-slices"></g>
              <circle cx="260" cy="260" r="52" class="wheel-core"></circle>
              <circle cx="260" cy="260" r="10" class="wheel-center-dot"></circle>
            </g>
          </svg>
        </div>
      </div>

      <article id="hero-description" class="hero-description" aria-live="polite"></article>
    </div>
  </header>

  <main id="content-root" class="content-root" tabindex="-1" aria-live="polite"></main>

  <footer class="site-footer" aria-label="Site footer">
    <div class="footer-left">
      <p class="footer-license">
        <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">
          CC BY-NC-ND 4.0
        </a>
      </p>
      <p class="footer-author">
        <a href="https://www.janmotal.cz/" target="_blank" rel="noopener noreferrer">janmotal.cz</a>
      </p>
    </div>

    <div class="footer-right">
      <label for="skin-select" class="footer-label">Skin</label>
      <select id="skin-select" aria-label="Změna skinu">
        <option value="msdos">MS-DOS</option>
        <option value="classic-mac">Classic Mac</option>
        <option value="atari">Atari</option>
      </select>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./js/skin-engine.js"></script>
  <script src="./js/markup-engine.js"></script>
  <script src="./js/ascii-chart.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
