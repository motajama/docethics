<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documentary Ethics Compass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link id="skin-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8XQw7jQ3D5R1B4QJ9M9+4Q7f8v+9O+g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <a class="skip-link" href="#content-root">Přeskočit na obsah</a>

  <header id="hero" class="hero" aria-labelledby="site-title">
    <div class="top-controls" role="toolbar" aria-label="Ovládání jazyka a skinu">
      <label for="language-select" class="sr-only">Jazyk</label>
      <select id="language-select" aria-label="Změna jazyka">
        <option value="cs">CS</option>
        <option value="en">EN</option>
        <option value="ua">UA</option>
        <option value="ar">AR</option>
      </select>

      <label for="skin-select" class="sr-only">Skin</label>
      <select id="skin-select" aria-label="Změna skinu">
        <option value="msdos">MS-DOS</option>
        <option value="classic-mac">Classic Mac</option>
        <option value="atari">Atari</option>
      </select>
    </div>

    <h1 id="site-title"></h1>
    <p id="site-subtitle"></p>

    <div class="wheel-wrap">
      <svg id="ethics-wheel" viewBox="0 0 420 420" role="img" aria-labelledby="wheel-title wheel-desc" tabindex="0">
        <title id="wheel-title">Interaktivní etický rozcestník</title>
        <desc id="wheel-desc">Kruhový navigační prvek rozdělený na čtyři části, který se otáčí jako kompas.</desc>
        <polygon points="210,18 200,44 220,44" class="wheel-marker" aria-hidden="true"></polygon>
        <g id="wheel-rotor">
          <g id="wheel-slices"></g>
          <circle cx="210" cy="210" r="58" class="wheel-core"></circle>
        </g>
      </svg>
      <ul id="wheel-labels" class="wheel-labels" aria-label="Sekce rozcestníku"></ul>
    </div>

    <article id="hero-description" class="hero-description" aria-live="polite"></article>
  </header>

  <main id="content-root" class="content-root" tabindex="-1" aria-live="polite"></main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./js/skin-engine.js"></script>
  <script src="./js/markup-engine.js"></script>
  <script src="./js/ascii-chart.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
